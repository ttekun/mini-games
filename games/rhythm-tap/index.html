<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <title>NEON//BEAT</title>
  <style>
    :root {
      --pop-pink:    #ff6eb4;
      --pop-sky:     #38d9f5;
      --pop-yellow:  #ffe44d;
      --pop-mint:    #4dffc3;
      --pop-purple:  #c77dff;
      --pop-orange:  #ff9f43;
      --pop-red:     #ff5252;
      --pop-bg1:     #1a0533;
      --pop-bg2:     #0a1a40;
      --pop-card:    rgba(255,255,255,0.07);
      --pop-border:  rgba(255,255,255,0.18);
      --font-main: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;

      /* Lane colors — vibrant pop palette */
      --lane0: #38d9f5;
      --lane1: #ff6eb4;
      --lane2: #c77dff;
      --lane3: #ffe44d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(160deg, #1a0533 0%, #0a1a40 50%, #0d2b1a 100%);
      color: #fff;
      font-family: var(--font-main);
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100dvh;
    }

    /* ── Header ── */
    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: linear-gradient(180deg, rgba(26,5,51,0.9) 0%, transparent 100%);
      border-bottom: 1px solid rgba(255,110,180,0.15);
    }

    #score-display {
      font-family: var(--font-main);
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--pop-sky), var(--pop-mint));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(56,217,245,0.5));
      letter-spacing: 1px;
    }

    #score-display::before {
      content: 'スコア ';
      font-size: 0.65rem;
      font-weight: 700;
      -webkit-text-fill-color: rgba(255,255,255,0.45);
      vertical-align: middle;
      letter-spacing: 2px;
    }

    #combo-display {
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 900;
      color: var(--pop-yellow);
      filter: drop-shadow(0 0 6px rgba(255,228,77,0.6));
      min-width: 90px;
      text-align: center;
    }

    #life-display {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .heart {
      font-size: 1.4rem;
      color: var(--pop-pink);
      filter: drop-shadow(0 0 5px rgba(255,110,180,0.7));
      transition: all 0.2s;
    }

    /* ── Canvases ── */
    #game-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Tap lanes ── */
    #lanes {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 112px;
      display: flex;
    }

    .lane-btn {
      flex: 1;
      border: none;
      outline: none;
      cursor: pointer;
      background: transparent;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    .lane-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-top: 2px solid rgba(56,217,245,0.25);
      background: linear-gradient(180deg,
        rgba(56,217,245,0.06) 0%,
        transparent 100%);
      transition: background 0.08s;
      border-radius: 0 0 0 0;
    }

    .lane-btn:nth-child(2)::before { border-top-color: rgba(255,110,180,0.3);  background: linear-gradient(180deg, rgba(255,110,180,0.05) 0%, transparent 100%); }
    .lane-btn:nth-child(3)::before { border-top-color: rgba(199,125,255,0.3);  background: linear-gradient(180deg, rgba(199,125,255,0.05) 0%, transparent 100%); }
    .lane-btn:nth-child(4)::before { border-top-color: rgba(255,228,77,0.3);   background: linear-gradient(180deg, rgba(255,228,77,0.05) 0%, transparent 100%); }

    .lane-btn.pressed::before,
    .lane-btn:active::before {
      background: linear-gradient(180deg, rgba(56,217,245,0.28) 0%, transparent 100%);
    }
    .lane-btn:nth-child(2).pressed::before  { background: linear-gradient(180deg, rgba(255,110,180,0.3)  0%, transparent 100%); }
    .lane-btn:nth-child(3).pressed::before  { background: linear-gradient(180deg, rgba(199,125,255,0.3)  0%, transparent 100%); }
    .lane-btn:nth-child(4).pressed::before  { background: linear-gradient(180deg, rgba(255,228,77,0.3)   0%, transparent 100%); }

    /* Round tap targets */
    .lane-btn .lane-icon {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 52px;
      border: 3px solid;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    .lane-btn .lane-icon span {
      display: block;
      font-size: 1.2rem;
      line-height: 1;
    }

    .lane-btn:nth-child(1) .lane-icon { border-color: var(--lane0); box-shadow: 0 0 14px var(--lane0), inset 0 0 10px rgba(56,217,245,0.12); }
    .lane-btn:nth-child(2) .lane-icon { border-color: var(--lane1); box-shadow: 0 0 14px var(--lane1), inset 0 0 10px rgba(255,110,180,0.12); }
    .lane-btn:nth-child(3) .lane-icon { border-color: var(--lane2); box-shadow: 0 0 14px var(--lane2), inset 0 0 10px rgba(199,125,255,0.12); }
    .lane-btn:nth-child(4) .lane-icon { border-color: var(--lane3); box-shadow: 0 0 14px var(--lane3), inset 0 0 10px rgba(255,228,77,0.12); }

    .lane-btn.pressed .lane-icon,
    .lane-btn:active .lane-icon {
      transform: translateX(-50%) scale(1.25);
    }

    /* ── Judgment text ── */
    #judgment {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-main);
      font-size: 2rem;
      font-weight: 900;
      pointer-events: none;
      opacity: 0;
      transition: none;
      z-index: 20;
      letter-spacing: 4px;
      filter: drop-shadow(0 0 16px currentColor);
    }

    /* ── Screens ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: linear-gradient(160deg, rgba(26,5,51,0.52) 0%, rgba(10,26,64,0.52) 100%);
      backdrop-filter: blur(1px);
      padding: 24px;
    }

    /* Floating dot pattern */
    .screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,110,180,0.12) 1px, transparent 1px),
        radial-gradient(circle, rgba(56,217,245,0.10) 1px, transparent 1px);
      background-size: 50px 50px, 80px 80px;
      background-position: 0 0, 25px 25px;
      pointer-events: none;
      animation: screenDotFloat 6s ease-in-out infinite alternate;
    }

    @keyframes screenDotFloat {
      from { background-position: 0 0, 25px 25px; }
      to   { background-position: 8px 12px, 33px 37px; }
    }
    
    .demo-badge {
      position: relative;
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--pop-yellow);
      background: rgba(255,228,77,0.12);
      border: 1.5px solid rgba(255,228,77,0.5);
      padding: 5px 18px;
      border-radius: 50px;
      margin-bottom: 18px;
      animation: demoBadgePulse 2s ease-in-out infinite;
    }
    
    @keyframes demoBadgePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(0.97); }
    }

    .screen.hidden { display: none; }

    .screen h1 {
      position: relative;
      font-family: var(--font-main);
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 5px;
      background: linear-gradient(135deg, var(--pop-sky) 0%, var(--pop-pink) 50%, var(--pop-yellow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 16px rgba(56,217,245,0.5));
      animation: titleBob 3s ease-in-out infinite alternate;
    }

    @keyframes titleBob {
      from { filter: drop-shadow(0 0 16px rgba(56,217,245,0.5)); }
      to   { filter: drop-shadow(0 0 24px rgba(255,110,180,0.6)); }
    }

    .screen .subtitle {
      position: relative;
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .screen p {
      position: relative;
      font-size: 0.88rem;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      margin-bottom: 22px;
      text-align: center;
      line-height: 1.9;
    }

    /* Round pop buttons */
    .btn-primary {
      position: relative;
      background: transparent;
      border: none;
      padding: 0;
      margin: 8px;
      cursor: pointer;
    }

    .btn-primary-inner {
      display: block;
      padding: 15px 48px;
      font-family: var(--font-main);
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: white;
      background: linear-gradient(135deg, var(--pop-pink), var(--pop-purple));
      border-radius: 50px;
      box-shadow: 0 6px 24px rgba(255,110,180,0.5), 0 2px 8px rgba(0,0,0,0.3);
      transition: box-shadow 0.1s, transform 0.1s;
    }

    .btn-primary:active .btn-primary-inner {
      transform: scale(0.95);
      box-shadow: 0 3px 12px rgba(255,110,180,0.4);
    }

    .btn-secondary {
      position: relative;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 11px 32px;
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: all 0.1s;
      margin: 5px;
    }

    .btn-secondary:active {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    /* ── Result screen ── */
    #result-screen .stat-grid {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 300px;
    }

    .stat-box {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 12px 10px;
      text-align: center;
    }

    .stat-box .label {
      font-family: var(--font-main);
      font-size: 0.62rem;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      margin-bottom: 5px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stat-box .value {
      font-family: var(--font-main);
      font-size: 1.6rem;
      font-weight: 900;
    }

    .stat-box.perfect .value { color: var(--pop-yellow); filter: drop-shadow(0 0 6px rgba(255,228,77,0.5)); }
    .stat-box.good    .value { color: var(--pop-mint);   filter: drop-shadow(0 0 6px rgba(77,255,195,0.5)); }
    .stat-box.miss    .value { color: var(--pop-pink);   filter: drop-shadow(0 0 6px rgba(255,110,180,0.5)); }
    .stat-box.score   .value { color: var(--pop-sky);    filter: drop-shadow(0 0 6px rgba(56,217,245,0.5)); }

    /* ── Rank badge ── */
    #rank-badge {
      position: relative;
      font-family: var(--font-main);
      font-size: 5.5rem;
      font-weight: 900;
      margin-bottom: 8px;
      line-height: 1;
      background: linear-gradient(135deg, var(--pop-yellow), var(--pop-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(255,228,77,0.6));
    }

    /* ── Difficulty selector ── */
    .diff-btns {
      position: relative;
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .diff-btn {
      padding: 10px 22px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.45);
      font-family: var(--font-main);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
    }

    .diff-btn.active {
      background: linear-gradient(135deg, rgba(255,110,180,0.35), rgba(56,217,245,0.35));
      border-color: var(--pop-pink);
      color: white;
      box-shadow: 0 0 16px rgba(255,110,180,0.4), 0 0 32px rgba(56,217,245,0.2);
    }

    /* ── Background canvas ── */
    #bg-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Corner decorations — replaced with rounded dots ── */
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      z-index: 200;
      pointer-events: none;
      background: var(--pop-sky);
      box-shadow: 0 0 10px var(--pop-sky);
      opacity: 0.5;
      animation: cornerPulse 2s ease-in-out infinite alternate;
    }
    .corner-tl { top: 10px; left: 10px; background: var(--pop-sky);    box-shadow: 0 0 10px var(--pop-sky); }
    .corner-tr { top: 10px; right: 10px; background: var(--pop-pink);  box-shadow: 0 0 10px var(--pop-pink); }
    .corner-bl { bottom: 10px; left: 10px; background: var(--pop-mint);   box-shadow: 0 0 10px var(--pop-mint); }
    .corner-br { bottom: 10px; right: 10px; background: var(--pop-yellow); box-shadow: 0 0 10px var(--pop-yellow); }

    @keyframes cornerPulse {
      from { opacity: 0.4; transform: scale(0.85); }
      to   { opacity: 0.9; transform: scale(1.15); }
    }
  </style>
</head>
<body>
<div id="game-container">
  <!-- Background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Game canvas (notes) -->
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="header">
    <div id="score-display">0</div>
    <div id="combo-display"></div>
    <div id="life-display"></div>
  </div>

  <!-- Judgment text -->
  <div id="judgment"></div>

  <!-- Tap lanes -->
  <div id="lanes">
    <button type="button" class="lane-btn" data-lane="0">
      <div class="lane-icon"><span>◀</span></div>
    </button>
    <button type="button" class="lane-btn" data-lane="1">
      <div class="lane-icon"><span>▼</span></div>
    </button>
    <button type="button" class="lane-btn" data-lane="2">
      <div class="lane-icon"><span>▲</span></div>
    </button>
    <button type="button" class="lane-btn" data-lane="3">
      <div class="lane-icon"><span>▶</span></div>
    </button>
  </div>

  <!-- Start screen -->
  <div id="start-screen" class="screen">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="demo-badge">DEMO PLAY</div>
    <h1 data-text="NEON//BEAT">NEON//BEAT</h1>
    <div class="subtitle">// RHYTHM SYSTEM v2.0 //</div>
    <p>ノートが判定ラインに来たらタップ<br>タイミングよくヒットしてスコアを稼げ</p>
    <div class="diff-btns">
      <button type="button" class="diff-btn active" data-diff="sho1">小学生1</button>
      <button type="button" class="diff-btn" data-diff="sho4">小学生4</button>
    </div>
    <button type="button" class="btn-primary" id="start-btn">
      <span class="btn-primary-inner">JACK IN</span>
    </button>
    <button type="button" class="btn-secondary" id="home-btn-start">HOME</button>
  </div>

  <!-- Result screen -->
  <div id="result-screen" class="screen hidden">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div id="rank-badge">S</div>
    <div class="stat-grid">
      <div class="stat-box score">
        <div class="label">SCORE</div>
        <div class="value" id="result-score">0</div>
      </div>
      <div class="stat-box" style="grid-column: span 1;">
        <div class="label">MAX COMBO</div>
        <div class="value" id="result-combo" style="color:#bc00ff; text-shadow: 0 0 10px #bc00ff;">0</div>
      </div>
      <div class="stat-box perfect">
        <div class="label">PERFECT</div>
        <div class="value" id="result-perfect">0</div>
      </div>
      <div class="stat-box good">
        <div class="label">GOOD</div>
        <div class="value" id="result-good">0</div>
      </div>
      <div class="stat-box miss" style="grid-column: span 2;">
        <div class="label">MISS</div>
        <div class="value" id="result-miss">0</div>
      </div>
    </div>
    <button type="button" class="btn-primary" id="retry-btn">
      <span class="btn-primary-inner">RETRY</span>
    </button>
    <button type="button" class="btn-secondary" id="menu-btn">DISCONNECT</button>
    <button type="button" class="btn-secondary" id="home-btn-result">HOME</button>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const LANE_COUNT = 4;
const LANE_COLORS = ['#38d9f5', '#ff6eb4', '#c77dff', '#ffe44d'];
const HIT_Y_RATIO = 0.85; // judgment line position (ratio from top)
const NOTE_RADIUS = 22;

const TIMING = {
  perfect: 120, // ms
  good:   220,  // ms
};

const DIFFICULTY = {
  sho1: { bpm: 50,  density: 0.28, speed: 180 },
  sho2: { bpm: 58,  density: 0.32, speed: 210 },
  sho3: { bpm: 66,  density: 0.36, speed: 240 },
  sho4: { bpm: 74,  density: 0.40, speed: 270 },
  sho5: { bpm: 82,  density: 0.44, speed: 300 },
};

const SCORE_TABLE = { perfect: 300, good: 100, miss: 0 };
const COMBO_BONUS = 10;
const MAX_LIVES = 3;

renderLives();

// ─── State ────────────────────────────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'result'
let diff = 'sho1';
let activeDiff = 'sho2'; // actual difficulty used during play (selected + 1)
// Maps selected difficulty key to the next level (+1)
const DIFF_NEXT = { sho1: 'sho2', sho4: 'sho5' };

let notes = [];
let score = 0;
let combo = 0;
let maxCombo = 0;
let lives = MAX_LIVES;
let stats = { perfect: 0, good: 0, miss: 0 };

let lastTime = 0;
let songTimer = 0;
let nextNoteTime = 0;
let beatInterval = 0;
const SONG_DURATION = 60000; // 60s

// Audio context
let audioCtx = null;

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const gameCanvas = document.getElementById('game-canvas');
const gc = gameCanvas.getContext('2d');
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');

function resize() {
  gameCanvas.width  = window.innerWidth;
  gameCanvas.height = window.innerHeight;
  bgCanvas.width    = window.innerWidth;
  bgCanvas.height   = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Background (pop sparkle + floating icons) ────────────────────────────
const POP_COLORS = ['#ff6eb4', '#38d9f5', '#ffe44d', '#4dffc3', '#c77dff', '#ff9f43'];
const POP_ICONS  = ['♪', '♫', '✦', '★', '✧', '♥'];

const particles = Array.from({ length: 55 }, () => createParticle());
const floatIcons = Array.from({ length: 14 }, () => createFloatIcon());

function createParticle() {
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 2 + 0.5,
    vy: -(Math.random() * 0.5 + 0.15),
    vx: (Math.random() - 0.5) * 0.3,
    alpha: Math.random() * 0.5 + 0.1,
    color: POP_COLORS[Math.floor(Math.random() * POP_COLORS.length)],
    pulse: Math.random() * Math.PI * 2,
  };
}

function createFloatIcon() {
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vy: -(Math.random() * 0.35 + 0.08),
    vx: (Math.random() - 0.5) * 0.2,
    size: Math.random() * 14 + 8,
    alpha: Math.random() * 0.18 + 0.05,
    icon: POP_ICONS[Math.floor(Math.random() * POP_ICONS.length)],
    color: POP_COLORS[Math.floor(Math.random() * POP_COLORS.length)],
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.02,
  };
}

function updateBg() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Soft diagonal gradient bands
  const bandGrad = bgCtx.createLinearGradient(0, 0, bgCanvas.width, bgCanvas.height);
  bandGrad.addColorStop(0,   'rgba(255,110,180,0.03)');
  bandGrad.addColorStop(0.5, 'rgba(56,217,245,0.025)');
  bandGrad.addColorStop(1,   'rgba(199,125,255,0.03)');
  bgCtx.fillStyle = bandGrad;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Glow particles
  const t = performance.now() * 0.001;
  particles.forEach(p => {
    p.y += p.vy;
    p.x += p.vx;
    p.pulse += 0.04;
    if (p.y < -10) { p.y = bgCanvas.height + 10; p.x = Math.random() * bgCanvas.width; }
    if (p.x < -10) p.x = bgCanvas.width + 10;
    if (p.x > bgCanvas.width + 10) p.x = -10;

    const pulse = 0.8 + 0.2 * Math.sin(p.pulse);
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r * pulse, 0, Math.PI * 2);
    bgCtx.fillStyle = p.color;
    bgCtx.globalAlpha = p.alpha * pulse;
    bgCtx.fill();
    bgCtx.globalAlpha = 1;
  });

  // Floating pop icons (♪ ★ ♥ etc)
  bgCtx.textAlign = 'center';
  bgCtx.textBaseline = 'middle';
  floatIcons.forEach(ic => {
    ic.y += ic.vy;
    ic.x += ic.vx;
    ic.rot += ic.rotSpeed;
    if (ic.y < -30) { ic.y = bgCanvas.height + 30; ic.x = Math.random() * bgCanvas.width; }
    if (ic.x < -30) ic.x = bgCanvas.width + 30;
    if (ic.x > bgCanvas.width + 30) ic.x = -30;

    bgCtx.save();
    bgCtx.translate(ic.x, ic.y);
    bgCtx.rotate(ic.rot);
    bgCtx.font = `${ic.size}px sans-serif`;
    bgCtx.fillStyle = ic.color;
    bgCtx.globalAlpha = ic.alpha;
    bgCtx.fillText(ic.icon, 0, 0);
    bgCtx.globalAlpha = 1;
    bgCtx.restore();
  });
}

// ─── Audio ────────────────────────────────────────────────────────────────────
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'perfect') {
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  } else if (type === 'good') {
    osc.frequency.value = 660;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  } else if (type === 'miss') {
    osc.frequency.value = 220;
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  } else if (type === 'bg') {
    // simple metronome tick
    osc.frequency.value = 440;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  }

  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.3);
}

// ─── BGM (J-pop style, Web Audio API) ────────────────────────────────────────
const BGM_BPM = 128;
const BGM_BEAT = 60 / BGM_BPM;          // seconds per beat
const BGM_BAR  = BGM_BEAT * 4;          // seconds per bar

// Note frequencies (equal temperament, A4=440)
const NOTE = (() => {
  const base = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
  return (name, oct) => 440 * Math.pow(2, (base[name[0]] + (name[1]==='#'?1:0) + (oct-4)*12 - 9) / 12);
})();

// J-pop melody: 16-note pattern (each = 1/4 beat = 1/16th note)
// [freq, durationBeats, startBeat (within 8-beat phrase)]
const MELODY_PHRASE = [
  [NOTE('E',5), 0.5, 0],  [NOTE('G',5), 0.5, 0.5],
  [NOTE('A',5), 1,   1],  [NOTE('G',5), 0.5, 2],
  [NOTE('E',5), 0.5, 2.5],[NOTE('D',5), 1,   3],
  [NOTE('C',5), 0.5, 4],  [NOTE('E',5), 0.5, 4.5],
  [NOTE('G',5), 0.5, 5],  [NOTE('A',5), 0.5, 5.5],
  [NOTE('B',5), 1,   6],  [NOTE('A',5), 0.5, 7],
  [NOTE('G',5), 0.5, 7.5],
];

// Bass: root notes on beats 0,2 of each bar
const BASS_PHRASE = [
  [NOTE('C',3), 0.8, 0], [NOTE('G',3), 0.8, 2],
  [NOTE('A',3), 0.8, 4], [NOTE('F',3), 0.8, 6],
];

// Chord pads (2-beat stabs)
const PAD_PHRASE = [
  [[NOTE('C',4), NOTE('E',4), NOTE('G',4)], 1.8, 0],
  [[NOTE('G',3), NOTE('B',3), NOTE('D',4)], 1.8, 2],
  [[NOTE('A',3), NOTE('C',4), NOTE('E',4)], 1.8, 4],
  [[NOTE('F',3), NOTE('A',3), NOTE('C',4)], 1.8, 6],
];

const PHRASE_LEN = 8; // beats

let bgmNodes = [];   // active source nodes for cleanup
let bgmLoopId = null;
let bgmGain = null;
let bgmStartTime = 0;
let bgmPlaying = false;

function bgmPlayTone(freq, startTime, duration, type, gainVal, masterGain) {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(masterGain);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.01);
  gain.gain.setValueAtTime(gainVal, startTime + duration * 0.75);
  gain.gain.linearRampToValueAtTime(0, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
  bgmNodes.push(osc);
}

function bgmPlayDrum(startTime, masterGain) {
  // Kick — low sine burst
  const kick = audioCtx.createOscillator();
  const kGain = audioCtx.createGain();
  kick.type = 'sine';
  kick.frequency.setValueAtTime(160, startTime);
  kick.frequency.exponentialRampToValueAtTime(40, startTime + 0.15);
  kick.connect(kGain); kGain.connect(masterGain);
  kGain.gain.setValueAtTime(0.7, startTime);
  kGain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);
  kick.start(startTime); kick.stop(startTime + 0.25);
  bgmNodes.push(kick);

  // Snare — noise burst via buffer
  const bufLen = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const snare = audioCtx.createBufferSource();
  const sGain = audioCtx.createGain();
  const sFilter = audioCtx.createBiquadFilter();
  sFilter.type = 'highpass'; sFilter.frequency.value = 1800;
  snare.buffer = buf;
  snare.connect(sFilter); sFilter.connect(sGain); sGain.connect(masterGain);
  sGain.gain.setValueAtTime(0, startTime + BGM_BEAT);
  sGain.gain.linearRampToValueAtTime(0.25, startTime + BGM_BEAT + 0.005);
  sGain.gain.exponentialRampToValueAtTime(0.001, startTime + BGM_BEAT + 0.12);
  snare.start(startTime + BGM_BEAT);
  snare.stop(startTime + BGM_BEAT + 0.15);
  bgmNodes.push(snare);

  // Hi-hat every half beat
  for (let h = 0; h < 4; h++) {
    const ht = startTime + h * BGM_BEAT * 0.5;
    const hBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
    const hData = hBuf.getChannelData(0);
    for (let i = 0; i < hData.length; i++) hData[i] = Math.random() * 2 - 1;
    const hat = audioCtx.createBufferSource();
    const hGain = audioCtx.createGain();
    const hFilter = audioCtx.createBiquadFilter();
    hFilter.type = 'highpass'; hFilter.frequency.value = 8000;
    hat.buffer = hBuf;
    hat.connect(hFilter); hFilter.connect(hGain); hGain.connect(masterGain);
    hGain.gain.setValueAtTime(0.12, ht);
    hGain.gain.exponentialRampToValueAtTime(0.001, ht + 0.05);
    hat.start(ht); hat.stop(ht + 0.06);
    bgmNodes.push(hat);
  }
}

function bgmSchedulePhrase(phraseStart) {
  if (!bgmPlaying) return;

  // Master gain for BGM
  const masterGain = bgmGain;

  // Drums: one bar = 2 beats, schedule 2 bars per phrase
  for (let bar = 0; bar < 4; bar++) {
    bgmPlayDrum(phraseStart + bar * BGM_BEAT * 2, masterGain);
  }

  // Melody
  MELODY_PHRASE.forEach(([freq, dur, beat]) => {
    bgmPlayTone(freq, phraseStart + beat * BGM_BEAT, dur * BGM_BEAT * 0.9,
                'triangle', 0.18, masterGain);
  });

  // Bass
  BASS_PHRASE.forEach(([freq, dur, beat]) => {
    bgmPlayTone(freq, phraseStart + beat * BGM_BEAT, dur * BGM_BEAT,
                'sawtooth', 0.12, masterGain);
  });

  // Pad chords
  PAD_PHRASE.forEach(([freqs, dur, beat]) => {
    freqs.forEach(freq => {
      bgmPlayTone(freq, phraseStart + beat * BGM_BEAT, dur * BGM_BEAT,
                  'sine', 0.06, masterGain);
    });
  });

  // Schedule next phrase slightly ahead
  const nextPhrase = phraseStart + PHRASE_LEN * BGM_BEAT;
  const lookahead = nextPhrase - audioCtx.currentTime;
  bgmLoopId = setTimeout(() => bgmSchedulePhrase(nextPhrase), (lookahead - 0.3) * 1000);
}

function startBGM() {
  if (bgmPlaying) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  bgmPlaying = true;
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0.5;
  bgmGain.connect(audioCtx.destination);
  bgmStartTime = audioCtx.currentTime + 0.05;
  bgmSchedulePhrase(bgmStartTime);
}

function stopBGM() {
  bgmPlaying = false;
  clearTimeout(bgmLoopId);
  bgmNodes.forEach(n => { try { n.stop(); } catch(_) {} });
  bgmNodes = [];
  if (bgmGain) { bgmGain.disconnect(); bgmGain = null; }
}

// ─── Note generation ──────────────────────────────────────────────────────────
function spawnNote() {
  const d = DIFFICULTY[activeDiff];
  const laneCount = Math.random() < d.density ? (Math.random() < 0.15 ? 2 : 1) : 1;
  const lanes = shuffleArr([0, 1, 2, 3]).slice(0, laneCount);
  lanes.forEach(lane => {
    notes.push({
      lane,
      y: -NOTE_RADIUS,
      speed: d.speed,
      hit: false,
      missed: false,
      hitEffect: 0,
      color: LANE_COLORS[lane],
    });
  });
}

function shuffleArr(arr) {
  return arr.slice().sort(() => Math.random() - 0.5);
}

// ─── Layout helpers ────────────────────────────────────────────────────────────
function laneX(lane) {
  const w = gameCanvas.width / LANE_COUNT;
  return w * lane + w / 2;
}

function hitY() {
  return gameCanvas.height * HIT_Y_RATIO;
}

// ─── Demo mode ────────────────────────────────────────────────────────────────
let demoNotes = [];
let demoTimer = 0;
let demoNextNote = 0;
let demoRafId = null;
let demoLastTime = 0;
const DEMO_BPM = 60;
const DEMO_SPEED = 220;
const DEMO_BEAT = (60 / DEMO_BPM) * 1000;

function startDemo() {
  demoNotes = [];
  demoTimer = 0;
  demoNextNote = DEMO_BEAT;
  demoLastTime = performance.now();
  demoRafId = requestAnimationFrame(demoLoop);
}

function stopDemo() {
  if (demoRafId !== null) {
    cancelAnimationFrame(demoRafId);
    demoRafId = null;
  }
  demoNotes = [];
  gc.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
}

function demoLoop(ts) {
  const dt = ts - demoLastTime;
  demoLastTime = ts;
  demoTimer += dt;

  // Spawn demo notes
  if (demoTimer >= demoNextNote) {
    const lane = Math.floor(Math.random() * LANE_COUNT);
    demoNotes.push({
      lane,
      y: -NOTE_RADIUS,
      speed: DEMO_SPEED,
      hit: false,
      missed: false,
      hitEffect: 0,
      color: LANE_COLORS[lane],
    });
    demoNextNote += DEMO_BEAT;
  }

  // Update demo notes and auto-hit near judgment line
  const jy = hitY();
  demoNotes.forEach(n => {
    if (!n.hit && !n.missed) {
      n.y += n.speed * (dt / 1000);
      // Auto-tap when note reaches judgment line
      if (Math.abs(n.y - jy) < 20) {
        n.hit = true;
        n.hitEffect = 1;
      }
      // Auto-miss if passed
      if (n.y > jy + 80) {
        n.missed = true;
      }
    }
    if (n.hitEffect > 0) n.hitEffect -= dt * 0.004;
  });

  // Clean up
  demoNotes = demoNotes.filter(n => !(n.missed && n.y > gameCanvas.height + 60) &&
                                     !(n.hit && n.hitEffect <= 0));

  // Draw demo
  drawDemo();
  demoRafId = requestAnimationFrame(demoLoop);
}

function drawDemo() {
  gc.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

  const W = gameCanvas.width;
  const H = gameCanvas.height;
  const laneW = W / LANE_COUNT;

  // Soft lane separators
  for (let i = 1; i < LANE_COUNT; i++) {
    gc.beginPath();
    gc.moveTo(laneW * i, 0);
    gc.lineTo(laneW * i, H);
    gc.strokeStyle = 'rgba(255,255,255,0.06)';
    gc.lineWidth = 1;
    gc.stroke();
  }

  // Judgment line — pop rainbow
  const jy = hitY();
  const jg = gc.createLinearGradient(0, 0, W, 0);
  jg.addColorStop(0,    '#38d9f5');
  jg.addColorStop(0.33, '#ff6eb4');
  jg.addColorStop(0.66, '#c77dff');
  jg.addColorStop(1,    '#ffe44d');
  gc.shadowColor = '#ff6eb4';
  gc.shadowBlur = 12;
  gc.fillStyle = jg;
  gc.fillRect(0, jy - 2, W, 3);
  gc.shadowBlur = 0;

  // Circle targets
  for (let i = 0; i < LANE_COUNT; i++) {
    const cx = laneX(i);
    gc.shadowColor = LANE_COLORS[i];
    gc.shadowBlur = 14;
    drawNote(gc, cx, jy, NOTE_RADIUS + 6);
    gc.strokeStyle = LANE_COLORS[i] + '66';
    gc.lineWidth = 2;
    gc.stroke();
    gc.shadowBlur = 0;
  }

  // Notes
  demoNotes.forEach(n => {
    if (n.missed && n.hitEffect <= 0) return;
    const cx = laneX(n.lane);
    const cy = n.hit ? jy : n.y;
    const alpha = n.hit ? Math.max(0, n.hitEffect) : 0.75;
    gc.globalAlpha = alpha;

    if (n.hit) {
      const progress = 1 - n.hitEffect;
      const outerR = NOTE_RADIUS * (1 + progress * 3);
      gc.shadowColor = n.color;
      gc.shadowBlur = 24 * n.hitEffect;
      drawNote(gc, cx, cy, outerR);
      gc.strokeStyle = n.color;
      gc.lineWidth = 3 * n.hitEffect;
      gc.stroke();
      gc.shadowBlur = 0;
    } else {
      gc.shadowColor = n.color;
      gc.shadowBlur = 22;
      const rg = gc.createRadialGradient(cx - NOTE_RADIUS * 0.35, cy - NOTE_RADIUS * 0.35,
                                          NOTE_RADIUS * 0.1, cx, cy, NOTE_RADIUS);
      rg.addColorStop(0,    '#ffffff');
      rg.addColorStop(0.25, n.color);
      rg.addColorStop(1,    n.color + 'bb');
      drawNote(gc, cx, cy, NOTE_RADIUS);
      gc.fillStyle = rg;
      gc.fill();
      drawNote(gc, cx, cy, NOTE_RADIUS);
      gc.strokeStyle = 'rgba(255,255,255,0.6)';
      gc.lineWidth = 2;
      gc.stroke();
      gc.shadowBlur = 0;
    }
    gc.globalAlpha = 1;
  });
}

// Start demo on page load
startDemo();

// ─── Game logic ───────────────────────────────────────────────────────────────
function startGame() {
  stopDemo();
  notes = [];
  score = 0;
  combo = 0;
  maxCombo = 0;
  lives = MAX_LIVES;
  stats = { perfect: 0, good: 0, miss: 0 };
  songTimer = 0;
  activeDiff = DIFF_NEXT[diff] || diff;
  beatInterval = (60 / DIFFICULTY[activeDiff].bpm) * 1000;
  nextNoteTime = beatInterval;
  updateHUD();
  updateLives();
  state = 'playing';
  lastTime = performance.now();
  startBGM();
  requestAnimationFrame(gameLoop);
}

function gameLoop(ts) {
  if (state !== 'playing') return;
  const dt = ts - lastTime;
  lastTime = ts;
  songTimer += dt;

  // Spawn notes
  if (songTimer >= nextNoteTime) {
    spawnNote();
    nextNoteTime += beatInterval;
    playSound('bg');
  }

  // Update notes
  notes.forEach(n => {
    if (state !== 'playing') return;
    if (!n.hit && !n.missed) {
      n.y += n.speed * (dt / 1000);
      // Auto-miss
      if (n.y > hitY() + TIMING.good * (n.speed / 1000) + NOTE_RADIUS * 2) {
        n.missed = true;
        onMiss();
      }
    }
    if (n.hitEffect > 0) n.hitEffect -= dt * 0.004;
  });

  // Clean up
  notes = notes.filter(n => !(n.missed && n.y > gameCanvas.height + 60) &&
                             !(n.hit && n.hitEffect <= 0));

  // End condition
  if (songTimer >= SONG_DURATION && notes.length === 0) {
    endGame();
    return;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// Pop-style circle note helper
function drawNote(ctx, cx, cy, r) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.closePath();
}

function draw() {
  gc.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

  const W = gameCanvas.width;
  const H = gameCanvas.height;
  const laneW = W / LANE_COUNT;

  // Soft lane separators
  for (let i = 1; i < LANE_COUNT; i++) {
    gc.beginPath();
    gc.moveTo(laneW * i, 0);
    gc.lineTo(laneW * i, H);
    gc.strokeStyle = 'rgba(255,255,255,0.06)';
    gc.lineWidth = 1;
    gc.stroke();
  }

  // Judgment line — pop rainbow glow
  const jy = hitY();
  const jg = gc.createLinearGradient(0, 0, W, 0);
  jg.addColorStop(0,    '#38d9f5');
  jg.addColorStop(0.33, '#ff6eb4');
  jg.addColorStop(0.66, '#c77dff');
  jg.addColorStop(1,    '#ffe44d');
  gc.shadowColor = '#ff6eb4';
  gc.shadowBlur = 12;
  gc.fillStyle = jg;
  gc.fillRect(0, jy - 2, W, 3);
  gc.shadowBlur = 0;

  // Circle targets on judgment line
  for (let i = 0; i < LANE_COUNT; i++) {
    const cx = laneX(i);
    gc.shadowColor = LANE_COLORS[i];
    gc.shadowBlur = 14;
    drawNote(gc, cx, jy, NOTE_RADIUS + 6);
    gc.strokeStyle = LANE_COLORS[i] + '66';
    gc.lineWidth = 2;
    gc.stroke();
    gc.shadowBlur = 0;
  }

  // Notes
  notes.forEach(n => {
    if (n.missed && n.hitEffect <= 0) return;

    const cx = laneX(n.lane);
    const cy = n.hit ? hitY() : n.y;
    const alpha = n.hit ? Math.max(0, n.hitEffect) : 1;
    gc.globalAlpha = alpha;

    if (n.hit) {
      // Pop burst — expanding circle ring
      const progress = 1 - n.hitEffect;
      const outerR = NOTE_RADIUS * (1 + progress * 3);

      gc.shadowColor = n.color;
      gc.shadowBlur = 24 * n.hitEffect;
      drawNote(gc, cx, cy, outerR);
      gc.strokeStyle = n.color;
      gc.lineWidth = 3 * n.hitEffect;
      gc.stroke();

      // Radial glow fill
      const rg = gc.createRadialGradient(cx, cy, 0, cx, cy, outerR);
      rg.addColorStop(0,   n.color + Math.floor(n.hitEffect * 140).toString(16).padStart(2,'0'));
      rg.addColorStop(0.5, n.color + '28');
      rg.addColorStop(1,   n.color + '00');
      drawNote(gc, cx, cy, outerR);
      gc.fillStyle = rg;
      gc.fill();
      gc.shadowBlur = 0;

    } else {
      // Normal note — glossy circle
      gc.shadowColor = n.color;
      gc.shadowBlur = 22;

      // Main fill
      const rg = gc.createRadialGradient(cx - NOTE_RADIUS * 0.35, cy - NOTE_RADIUS * 0.35,
                                          NOTE_RADIUS * 0.1, cx, cy, NOTE_RADIUS);
      rg.addColorStop(0,   '#ffffff');
      rg.addColorStop(0.25, n.color);
      rg.addColorStop(1,   n.color + 'bb');
      drawNote(gc, cx, cy, NOTE_RADIUS);
      gc.fillStyle = rg;
      gc.fill();

      // White border glow
      drawNote(gc, cx, cy, NOTE_RADIUS);
      gc.strokeStyle = 'rgba(255,255,255,0.6)';
      gc.lineWidth = 2;
      gc.stroke();

      // Small gloss highlight
      gc.beginPath();
      gc.arc(cx - NOTE_RADIUS * 0.3, cy - NOTE_RADIUS * 0.3, NOTE_RADIUS * 0.22, 0, Math.PI * 2);
      gc.fillStyle = 'rgba(255,255,255,0.45)';
      gc.fill();

      gc.shadowBlur = 0;
    }

    gc.globalAlpha = 1;
  });

  // Progress bar — pop rainbow
  const progress = Math.min(songTimer / SONG_DURATION, 1);
  gc.fillStyle = 'rgba(255,255,255,0.05)';
  gc.fillRect(0, 0, W, 6);
  const pg = gc.createLinearGradient(0, 0, W * progress, 0);
  pg.addColorStop(0,    '#38d9f5');
  pg.addColorStop(0.33, '#ff6eb4');
  pg.addColorStop(0.66, '#c77dff');
  pg.addColorStop(1,    '#ffe44d');
  gc.shadowColor = '#ff6eb4';
  gc.shadowBlur = 8;
  gc.fillStyle = pg;
  gc.fillRect(0, 0, W * progress, 6);
  gc.shadowBlur = 0;
}

// ─── Tap handling ──────────────────────────────────────────────────────────────
function onTap(lane) {
  if (state !== 'playing') return;
  initAudio();

  const jy = hitY();
  let best = null;
  let bestDist = Infinity;

  notes.forEach(n => {
    if (n.hit || n.missed || n.lane !== lane) return;
    const dist = Math.abs(n.y - jy);
    if (dist < bestDist) { bestDist = dist; best = n; }
  });

  const maxDist = TIMING.good * (DIFFICULTY[activeDiff].speed / 1000);
  if (!best || bestDist > maxDist) return; // No note to hit

  best.hit = true;
  best.hitEffect = 1;

  const timingMs = bestDist / (DIFFICULTY[activeDiff].speed / 1000);

  if (timingMs <= TIMING.perfect) {
    registerHit('perfect');
  } else {
    registerHit('good');
  }
}

function registerHit(type) {
  stats[type]++;
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  score += SCORE_TABLE[type] + combo * COMBO_BONUS;
  showJudgment(type);
  playSound(type);
  updateHUD();
}

function onMiss() {
  if (state !== 'playing') return;
  stats.miss++;
  combo = 0;
  lives--;
  showJudgment('miss');
  playSound('miss');
  updateHUD();
  updateLives();
  if (lives <= 0) endGame();
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('combo-display').textContent =
    combo >= 3 ? `${combo} COMBO` : '';
}

function updateLives() {
  const hearts = document.querySelectorAll('.heart');
  hearts.forEach((h, i) => {
    h.textContent = i < lives ? '▰' : '▱';
    h.style.opacity = i < lives ? '1' : '0.25';
    h.style.color = i < lives ? 'var(--cp-pink)' : 'rgba(255,0,110,0.3)';
  });
}

function renderLives() {
  const lifeDisplay = document.getElementById('life-display');
  lifeDisplay.replaceChildren(
    ...Array.from({ length: MAX_LIVES }, () => {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = '▰';
      return heart;
    })
  );
}

// ─── Judgment display ─────────────────────────────────────────────────────────
let judgmentTimer = null;
function showJudgment(type) {
  const el = document.getElementById('judgment');
  const map = {
    perfect: { text: '✦ PERFECT ✦', color: '#ffe44d' },
    good:    { text: '♪ GOOD',     color: '#4dffc3' },
    miss:    { text: 'MISS',        color: '#ff6eb4' },
  };
  const m = map[type];
  el.textContent = m.text;
  el.style.color = m.color;
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, -60%) scale(1.2)';
  el.style.transition = 'none';

  clearTimeout(judgmentTimer);
  judgmentTimer = setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, -80%) scale(0.9)';
  }, 350);
}

// ─── End game ─────────────────────────────────────────────────────────────────
function endGame() {
  if (state === 'result') return;
  state = 'result';
  stopBGM();
  const total = stats.perfect + stats.good + stats.miss;
  const acc = total > 0 ? (stats.perfect * 100 + stats.good * 60) / (total * 100) : 0;
  const rank = acc >= 0.95 ? 'S' : acc >= 0.85 ? 'A' : acc >= 0.70 ? 'B' : acc >= 0.50 ? 'C' : 'D';
  const rankColors = { S: '#ffd700', A: '#64c8ff', B: '#64ff96', C: '#ffc864', D: '#ff6464' };

  document.getElementById('rank-badge').textContent = rank;
  document.getElementById('rank-badge').style.color = rankColors[rank];
  document.getElementById('rank-badge').style.textShadow = `0 0 30px ${rankColors[rank]}`;
  document.getElementById('result-score').textContent = score.toLocaleString();
  document.getElementById('result-combo').textContent = maxCombo;
  document.getElementById('result-perfect').textContent = stats.perfect;
  document.getElementById('result-good').textContent = stats.good;
  document.getElementById('result-miss').textContent = stats.miss;

  document.getElementById('result-screen').classList.remove('hidden');
}

// ─── Button / Touch events ─────────────────────────────────────────────────────
document.querySelectorAll('.lane-btn').forEach(btn => {
  const lane = parseInt(btn.dataset.lane, 10);

  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state !== 'playing') return;
    btn.classList.add('pressed');
    onTap(lane);
  }, { passive: false });

  btn.addEventListener('touchend', e => {
    e.preventDefault();
    btn.classList.remove('pressed');
  }, { passive: false });

  btn.addEventListener('mousedown', () => {
    if (state !== 'playing') return;
    btn.classList.add('pressed');
    onTap(lane);
  });

  btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
  btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
});

// Keyboard support (A S D F)
const KEY_MAP = { a: 0, s: 1, d: 2, f: 3, ArrowLeft: 0, ArrowDown: 1, ArrowUp: 2, ArrowRight: 3 };
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (state !== 'playing') return;
  const lane = KEY_MAP[e.key];
  if (lane !== undefined) {
    e.preventDefault();
    onTap(lane);
  }
});

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    diff = btn.dataset.diff;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Start
document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('start-screen').classList.add('hidden');
  startGame();
});

// Retry
document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.add('hidden');
  startGame();
});

// Menu
document.getElementById('menu-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
  state = 'start';
  startDemo();
});

// Home buttons
document.getElementById('home-btn-start').addEventListener('click', () => {
  window.location.href = '../../index.html';
});
document.getElementById('home-btn-result').addEventListener('click', () => {
  window.location.href = '../../index.html';
});

// Background loop (always running)
(function bgLoop() {
  updateBg();
  requestAnimationFrame(bgLoop);
})();
</script>
</body>
</html>
