<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NEON//BEAT</title>
  <style>
    :root {
      --cp-cyan:    #00ffe7;
      --cp-pink:    #ff006e;
      --cp-yellow:  #ffe600;
      --cp-purple:  #bc00ff;
      --cp-bg:      #04030a;
      --cp-panel:   #080614;
      --cp-grid:    rgba(0,255,231,0.06);
      --font-display: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--cp-bg);
      color: #e0e0ff;
      font-family: var(--font-display);
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    /* ── Scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100dvh;
    }

    /* ── Header ── */
    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: linear-gradient(180deg, rgba(4,3,10,0.92) 0%, transparent 100%);
      border-bottom: 1px solid rgba(0,255,231,0.12);
    }

    #score-display {
      font-family: var(--font-mono);
      font-size: 1.7rem;
      color: var(--cp-cyan);
      text-shadow: 0 0 12px var(--cp-cyan), 0 0 28px rgba(0,255,231,0.4);
      letter-spacing: 2px;
    }

    #score-display::before {
      content: 'SCR ';
      font-size: 0.7rem;
      color: rgba(0,255,231,0.5);
      vertical-align: middle;
      letter-spacing: 3px;
    }

    #combo-display {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--cp-yellow);
      text-shadow: 0 0 10px var(--cp-yellow);
      min-width: 90px;
      text-align: center;
      letter-spacing: 2px;
    }

    #life-display {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .heart {
      font-size: 1.2rem;
      color: var(--cp-pink);
      text-shadow: 0 0 8px var(--cp-pink);
      transition: all 0.2s;
    }

    /* ── Canvases ── */
    #game-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Tap lanes ── */
    #lanes {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 108px;
      display: flex;
    }

    .lane-btn {
      flex: 1;
      border: none;
      outline: none;
      cursor: pointer;
      background: transparent;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    /* Cyberpunk diagonal slice border */
    .lane-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-top: 1px solid rgba(0,255,231,0.18);
      background: linear-gradient(180deg,
        rgba(0,255,231,0.03) 0%,
        rgba(0,255,231,0.01) 100%);
      transition: background 0.08s;
    }

    .lane-btn:nth-child(2)::before { border-top-color: rgba(255,0,110,0.25); }
    .lane-btn:nth-child(3)::before { border-top-color: rgba(188,0,255,0.25); }
    .lane-btn:nth-child(4)::before { border-top-color: rgba(255,230,0,0.25); }

    .lane-btn.pressed::before,
    .lane-btn:active::before {
      background: linear-gradient(180deg,
        rgba(0,255,231,0.18) 0%,
        transparent 100%);
    }
    .lane-btn:nth-child(2).pressed::before  { background: linear-gradient(180deg, rgba(255,0,110,0.22) 0%, transparent 100%); }
    .lane-btn:nth-child(3).pressed::before  { background: linear-gradient(180deg, rgba(188,0,255,0.22) 0%, transparent 100%); }
    .lane-btn:nth-child(4).pressed::before  { background: linear-gradient(180deg, rgba(255,230,0,0.22) 0%, transparent 100%); }

    /* Diamond-shaped tap targets */
    .lane-btn .lane-icon {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 44px;
      height: 44px;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.08s;
      clip-path: none;
    }

    .lane-btn .lane-icon span {
      display: block;
      transform: rotate(-45deg);
      font-size: 1rem;
      line-height: 1;
    }

    .lane-btn:nth-child(1) .lane-icon { border-color: var(--cp-cyan);   box-shadow: 0 0 10px var(--cp-cyan),   inset 0 0 8px rgba(0,255,231,0.1); }
    .lane-btn:nth-child(2) .lane-icon { border-color: var(--cp-pink);   box-shadow: 0 0 10px var(--cp-pink),   inset 0 0 8px rgba(255,0,110,0.1); }
    .lane-btn:nth-child(3) .lane-icon { border-color: var(--cp-purple); box-shadow: 0 0 10px var(--cp-purple), inset 0 0 8px rgba(188,0,255,0.1); }
    .lane-btn:nth-child(4) .lane-icon { border-color: var(--cp-yellow); box-shadow: 0 0 10px var(--cp-yellow), inset 0 0 8px rgba(255,230,0,0.1); }

    .lane-btn.pressed .lane-icon,
    .lane-btn:active .lane-icon {
      transform: translateX(-50%) rotate(45deg) scale(1.2);
    }

    /* ── Judgment text ── */
    #judgment {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      transition: none;
      z-index: 20;
      letter-spacing: 6px;
      text-shadow: 0 0 24px currentColor, 0 0 48px currentColor;
    }

    /* ── Screens ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(4,3,10,0.96);
      padding: 24px;
    }

    /* Grid bg for screens */
    .screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--cp-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--cp-grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .screen.hidden { display: none; }

    .screen h1 {
      position: relative;
      font-family: var(--font-display);
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--cp-cyan);
      text-shadow:
        0 0 10px var(--cp-cyan),
        0 0 30px rgba(0,255,231,0.6),
        0 0 60px rgba(0,255,231,0.2);
      margin-bottom: 4px;
    }

    /* Glitch effect on title */
    .screen h1::before,
    .screen h1::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }

    .screen h1::before {
      color: var(--cp-pink);
      text-shadow: none;
      animation: glitch-a 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }

    .screen h1::after {
      color: var(--cp-purple);
      text-shadow: none;
      animation: glitch-b 3s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }

    @keyframes glitch-a {
      0%, 90%, 100% { transform: translateX(0); opacity: 0; }
      92%            { transform: translateX(-3px); opacity: 0.7; }
      94%            { transform: translateX(3px);  opacity: 0.7; }
      96%            { transform: translateX(0);    opacity: 0; }
    }

    @keyframes glitch-b {
      0%, 88%, 100% { transform: translateX(0); opacity: 0; }
      90%            { transform: translateX(3px);  opacity: 0.6; }
      92%            { transform: translateX(-3px); opacity: 0.6; }
      94%            { transform: translateX(0);    opacity: 0; }
    }

    .screen .subtitle {
      position: relative;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: rgba(0,255,231,0.45);
      letter-spacing: 4px;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .screen p {
      position: relative;
      font-size: 0.95rem;
      color: rgba(200,200,255,0.55);
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.8;
      font-family: var(--font-mono);
    }

    /* Cyberpunk clip-path buttons */
    .btn-primary {
      position: relative;
      background: transparent;
      border: none;
      padding: 0;
      margin: 10px;
      cursor: pointer;
    }

    .btn-primary-inner {
      display: block;
      padding: 14px 44px;
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--cp-bg);
      background: var(--cp-cyan);
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      text-shadow: none;
      box-shadow: 0 0 24px rgba(0,255,231,0.5), 0 0 48px rgba(0,255,231,0.2);
      transition: box-shadow 0.1s, transform 0.1s;
    }

    .btn-primary:active .btn-primary-inner {
      transform: scale(0.97);
      box-shadow: 0 0 12px rgba(0,255,231,0.5);
    }

    .btn-secondary {
      position: relative;
      background: transparent;
      border: 1px solid rgba(0,255,231,0.35);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      padding: 11px 32px;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.6);
      cursor: pointer;
      transition: all 0.1s;
      margin: 6px;
    }

    .btn-secondary:active {
      background: rgba(0,255,231,0.08);
      color: var(--cp-cyan);
    }

    /* ── Result screen ── */
    #result-screen .stat-grid {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
      width: 100%;
      max-width: 320px;
    }

    .stat-box {
      background: rgba(0,255,231,0.03);
      border: 1px solid rgba(0,255,231,0.15);
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      padding: 14px 12px;
      text-align: center;
    }

    .stat-box .label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: rgba(0,255,231,0.4);
      margin-bottom: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stat-box .value {
      font-family: var(--font-mono);
      font-size: 1.7rem;
      font-weight: bold;
    }

    .stat-box.perfect .value { color: var(--cp-yellow); text-shadow: 0 0 10px var(--cp-yellow); }
    .stat-box.good    .value { color: #00ff88;           text-shadow: 0 0 10px #00ff88; }
    .stat-box.miss    .value { color: var(--cp-pink);    text-shadow: 0 0 10px var(--cp-pink); }
    .stat-box.score   .value { color: var(--cp-cyan);    text-shadow: 0 0 10px var(--cp-cyan); }

    /* ── Rank badge ── */
    #rank-badge {
      position: relative;
      font-family: var(--font-display);
      font-size: 6rem;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1;
    }

    /* ── Difficulty selector ── */
    .diff-btns {
      position: relative;
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .diff-btn {
      padding: 8px 18px;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      border: 1px solid rgba(0,255,231,0.2);
      background: transparent;
      color: rgba(200,200,255,0.4);
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .diff-btn.active {
      background: rgba(0,255,231,0.12);
      border-color: var(--cp-cyan);
      color: var(--cp-cyan);
      text-shadow: 0 0 8px var(--cp-cyan);
      box-shadow: 0 0 12px rgba(0,255,231,0.2);
    }

    /* ── Background canvas ── */
    #bg-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Corner decorations ── */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 200;
      pointer-events: none;
    }
    .corner-tl { top: 6px; left: 6px; border-top: 2px solid var(--cp-cyan); border-left: 2px solid var(--cp-cyan); }
    .corner-tr { top: 6px; right: 6px; border-top: 2px solid var(--cp-cyan); border-right: 2px solid var(--cp-cyan); }
    .corner-bl { bottom: 6px; left: 6px; border-bottom: 2px solid var(--cp-cyan); border-left: 2px solid var(--cp-cyan); }
    .corner-br { bottom: 6px; right: 6px; border-bottom: 2px solid var(--cp-cyan); border-right: 2px solid var(--cp-cyan); }

    /* ── Flicker animation ── */
    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98%            { opacity: 0.7; }
      99%            { opacity: 1; }
    }

    #game-container { animation: flicker 8s infinite; }
  </style>
</head>
<body>
<div id="game-container">
  <!-- Background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Game canvas (notes) -->
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="header">
    <div id="score-display">0</div>
    <div id="combo-display"></div>
    <div id="life-display"></div>
  </div>

  <!-- Judgment text -->
  <div id="judgment"></div>

  <!-- Tap lanes -->
  <div id="lanes">
    <button type="button" class="lane-btn" data-lane="0">
      <div class="lane-icon"><span>◀</span></div>
    </button>
    <button type="button" class="lane-btn" data-lane="1">
      <div class="lane-icon"><span>▼</span></div>
    </button>
    <button type="button" class="lane-btn" data-lane="2">
      <div class="lane-icon"><span>▲</span></div>
    </button>
    <button type="button" class="lane-btn" data-lane="3">
      <div class="lane-icon"><span>▶</span></div>
    </button>
  </div>

  <!-- Start screen -->
  <div id="start-screen" class="screen">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <h1 data-text="NEON//BEAT">NEON//BEAT</h1>
    <div class="subtitle">// RHYTHM SYSTEM v2.0 //</div>
    <p>ノートが判定ラインに来たらタップ<br>タイミングよくヒットしてスコアを稼げ</p>
    <div class="diff-btns">
      <button type="button" class="diff-btn active" data-diff="easy">EASY</button>
      <button type="button" class="diff-btn" data-diff="normal">NORMAL</button>
      <button type="button" class="diff-btn" data-diff="hard">HARD</button>
    </div>
    <button type="button" class="btn-primary" id="start-btn">
      <span class="btn-primary-inner">JACK IN</span>
    </button>
    <button type="button" class="btn-secondary" id="home-btn-start">HOME</button>
  </div>

  <!-- Result screen -->
  <div id="result-screen" class="screen hidden">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div id="rank-badge">S</div>
    <div class="stat-grid">
      <div class="stat-box score">
        <div class="label">SCORE</div>
        <div class="value" id="result-score">0</div>
      </div>
      <div class="stat-box" style="grid-column: span 1;">
        <div class="label">MAX COMBO</div>
        <div class="value" id="result-combo" style="color:#bc00ff; text-shadow: 0 0 10px #bc00ff;">0</div>
      </div>
      <div class="stat-box perfect">
        <div class="label">PERFECT</div>
        <div class="value" id="result-perfect">0</div>
      </div>
      <div class="stat-box good">
        <div class="label">GOOD</div>
        <div class="value" id="result-good">0</div>
      </div>
      <div class="stat-box miss" style="grid-column: span 2;">
        <div class="label">MISS</div>
        <div class="value" id="result-miss">0</div>
      </div>
    </div>
    <button type="button" class="btn-primary" id="retry-btn">
      <span class="btn-primary-inner">RETRY</span>
    </button>
    <button type="button" class="btn-secondary" id="menu-btn">DISCONNECT</button>
    <button type="button" class="btn-secondary" id="home-btn-result">HOME</button>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const LANE_COUNT = 4;
const LANE_COLORS = ['#00ffe7', '#ff006e', '#bc00ff', '#ffe600'];
const HIT_Y_RATIO = 0.85; // judgment line position (ratio from top)
const NOTE_RADIUS = 22;

const TIMING = {
  perfect: 70,  // ms
  good:   160,  // ms
};

const DIFFICULTY = {
  easy:   { bpm: 90,  density: 0.5, speed: 380 },
  normal: { bpm: 120, density: 0.7, speed: 480 },
  hard:   { bpm: 150, density: 0.9, speed: 600 },
};

const SCORE_TABLE = { perfect: 300, good: 100, miss: 0 };
const COMBO_BONUS = 10;
const MAX_LIVES = 3;

renderLives();

// ─── State ────────────────────────────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'result'
let diff = 'easy';

let notes = [];
let score = 0;
let combo = 0;
let maxCombo = 0;
let lives = MAX_LIVES;
let stats = { perfect: 0, good: 0, miss: 0 };

let lastTime = 0;
let songTimer = 0;
let nextNoteTime = 0;
let beatInterval = 0;
const SONG_DURATION = 60000; // 60s

// Audio context
let audioCtx = null;

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const gameCanvas = document.getElementById('game-canvas');
const gc = gameCanvas.getContext('2d');
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');

function resize() {
  gameCanvas.width  = window.innerWidth;
  gameCanvas.height = window.innerHeight;
  bgCanvas.width    = window.innerWidth;
  bgCanvas.height   = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Background (cyberpunk city grid + data streams) ──────────────────────
const particles = Array.from({ length: 40 }, () => createParticle());
const dataStreams = Array.from({ length: 6 }, () => createStream());

function createParticle() {
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5 + 0.3,
    vy: -(Math.random() * 0.6 + 0.2),
    alpha: Math.random() * 0.5 + 0.15,
    color: LANE_COLORS[Math.floor(Math.random() * 4)],
  };
}

function createStream() {
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    speed: Math.random() * 1.5 + 0.8,
    len: Math.floor(Math.random() * 8 + 4),
    chars: Array.from({ length: 12 }, () => String.fromCharCode(0x30A0 + Math.random() * 96)),
    alpha: Math.random() * 0.3 + 0.08,
    color: Math.random() < 0.6 ? '#00ffe7' : '#bc00ff',
  };
}

function updateBg() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Grid lines
  bgCtx.strokeStyle = 'rgba(0,255,231,0.04)';
  bgCtx.lineWidth = 1;
  const gridSz = 40;
  for (let x = 0; x < bgCanvas.width; x += gridSz) {
    bgCtx.beginPath();
    bgCtx.moveTo(x, 0);
    bgCtx.lineTo(x, bgCanvas.height);
    bgCtx.stroke();
  }
  for (let y = 0; y < bgCanvas.height; y += gridSz) {
    bgCtx.beginPath();
    bgCtx.moveTo(0, y);
    bgCtx.lineTo(bgCanvas.width, y);
    bgCtx.stroke();
  }

  // Horizontal scan flash (rare)
  if (Math.random() < 0.004) {
    const sy = Math.random() * bgCanvas.height;
    const sg = bgCtx.createLinearGradient(0, sy, bgCanvas.width, sy);
    sg.addColorStop(0,   'transparent');
    sg.addColorStop(0.4, 'rgba(0,255,231,0.06)');
    sg.addColorStop(0.6, 'rgba(0,255,231,0.06)');
    sg.addColorStop(1,   'transparent');
    bgCtx.fillStyle = sg;
    bgCtx.fillRect(0, sy - 1, bgCanvas.width, 2);
  }

  // Falling data streams (matrix style)
  bgCtx.font = '10px monospace';
  dataStreams.forEach(s => {
    s.y += s.speed;
    if (s.y > bgCanvas.height + s.len * 12) {
      s.y = -s.len * 12;
      s.x = Math.random() * bgCanvas.width;
      s.chars = Array.from({ length: 12 }, () => String.fromCharCode(0x30A0 + Math.random() * 96));
    }
    for (let i = 0; i < s.len; i++) {
      const fade = (i / s.len) * s.alpha;
      bgCtx.globalAlpha = fade;
      bgCtx.fillStyle = i === s.len - 1 ? '#ffffff' : s.color;
      bgCtx.fillText(s.chars[i % s.chars.length], s.x, s.y - i * 12);
    }
    bgCtx.globalAlpha = 1;
  });

  // Glow particles
  particles.forEach(p => {
    p.y += p.vy;
    if (p.y < 0) { p.y = bgCanvas.height; p.x = Math.random() * bgCanvas.width; }
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fillStyle = p.color;
    bgCtx.globalAlpha = p.alpha;
    bgCtx.fill();
    bgCtx.globalAlpha = 1;
  });
}

// ─── Audio ────────────────────────────────────────────────────────────────────
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'perfect') {
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  } else if (type === 'good') {
    osc.frequency.value = 660;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  } else if (type === 'miss') {
    osc.frequency.value = 220;
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  } else if (type === 'bg') {
    // simple metronome tick
    osc.frequency.value = 440;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  }

  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.3);
}

// ─── Note generation ──────────────────────────────────────────────────────────
function spawnNote() {
  const d = DIFFICULTY[diff];
  const laneCount = Math.random() < d.density ? (Math.random() < 0.15 ? 2 : 1) : 1;
  const lanes = shuffleArr([0, 1, 2, 3]).slice(0, laneCount);
  lanes.forEach(lane => {
    notes.push({
      lane,
      y: -NOTE_RADIUS,
      speed: d.speed,
      hit: false,
      missed: false,
      hitEffect: 0,
      color: LANE_COLORS[lane],
    });
  });
}

function shuffleArr(arr) {
  return arr.slice().sort(() => Math.random() - 0.5);
}

// ─── Layout helpers ────────────────────────────────────────────────────────────
function laneX(lane) {
  const w = gameCanvas.width / LANE_COUNT;
  return w * lane + w / 2;
}

function hitY() {
  return gameCanvas.height * HIT_Y_RATIO;
}

// ─── Game logic ───────────────────────────────────────────────────────────────
function startGame() {
  notes = [];
  score = 0;
  combo = 0;
  maxCombo = 0;
  lives = MAX_LIVES;
  stats = { perfect: 0, good: 0, miss: 0 };
  songTimer = 0;
  beatInterval = (60 / DIFFICULTY[diff].bpm) * 1000;
  nextNoteTime = beatInterval;
  updateHUD();
  updateLives();
  state = 'playing';
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function gameLoop(ts) {
  if (state !== 'playing') return;
  const dt = ts - lastTime;
  lastTime = ts;
  songTimer += dt;

  // Spawn notes
  if (songTimer >= nextNoteTime) {
    spawnNote();
    nextNoteTime += beatInterval;
    playSound('bg');
  }

  // Update notes
  notes.forEach(n => {
    if (state !== 'playing') return;
    if (!n.hit && !n.missed) {
      n.y += n.speed * (dt / 1000);
      // Auto-miss
      if (n.y > hitY() + TIMING.good * (n.speed / 1000) + NOTE_RADIUS * 2) {
        n.missed = true;
        onMiss();
      }
    }
    if (n.hitEffect > 0) n.hitEffect -= dt * 0.004;
  });

  // Clean up
  notes = notes.filter(n => !(n.missed && n.y > gameCanvas.height + 60) &&
                             !(n.hit && n.hitEffect <= 0));

  // End condition
  if (songTimer >= SONG_DURATION && notes.length === 0) {
    endGame();
    return;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

function drawDiamond(ctx, cx, cy, size) {
  ctx.beginPath();
  ctx.moveTo(cx,          cy - size);
  ctx.lineTo(cx + size,   cy);
  ctx.lineTo(cx,          cy + size);
  ctx.lineTo(cx - size,   cy);
  ctx.closePath();
}

function draw() {
  gc.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

  const W = gameCanvas.width;
  const H = gameCanvas.height;
  const laneW = W / LANE_COUNT;

  // Lane separators
  for (let i = 1; i < LANE_COUNT; i++) {
    gc.beginPath();
    gc.moveTo(laneW * i, 0);
    gc.lineTo(laneW * i, H);
    gc.strokeStyle = 'rgba(0,255,231,0.07)';
    gc.lineWidth = 1;
    gc.stroke();
  }

  // Judgment line — neon cyan glow
  const jy = hitY();
  gc.shadowColor = '#00ffe7';
  gc.shadowBlur = 14;
  gc.fillStyle = 'rgba(0,255,231,0.85)';
  gc.fillRect(0, jy - 1, W, 2);
  gc.shadowBlur = 0;

  // Diamond targets on judgment line
  for (let i = 0; i < LANE_COUNT; i++) {
    const cx = laneX(i);
    gc.shadowColor = LANE_COLORS[i];
    gc.shadowBlur = 10;
    drawDiamond(gc, cx, jy, NOTE_RADIUS + 5);
    gc.strokeStyle = LANE_COLORS[i] + '55';
    gc.lineWidth = 1.5;
    gc.stroke();
    gc.shadowBlur = 0;
  }

  // Notes
  notes.forEach(n => {
    if (n.missed && n.hitEffect <= 0) return;

    const cx = laneX(n.lane);
    const cy = n.hit ? hitY() : n.y;
    const alpha = n.hit ? Math.max(0, n.hitEffect) : 1;
    gc.globalAlpha = alpha;

    if (n.hit) {
      // Cyberpunk burst — expanding diamond + ring
      const progress = 1 - n.hitEffect;
      const outerR = NOTE_RADIUS * (1 + progress * 2.5);

      // Expanding outer ring
      drawDiamond(gc, cx, cy, outerR);
      gc.strokeStyle = n.color;
      gc.lineWidth = 2 * n.hitEffect;
      gc.shadowColor = n.color;
      gc.shadowBlur = 20 * n.hitEffect;
      gc.stroke();

      // Radial glow fill
      const rg = gc.createRadialGradient(cx, cy, 0, cx, cy, outerR);
      rg.addColorStop(0,   n.color + Math.floor(n.hitEffect * 180).toString(16).padStart(2,'0'));
      rg.addColorStop(0.5, n.color + '30');
      rg.addColorStop(1,   n.color + '00');
      drawDiamond(gc, cx, cy, outerR);
      gc.fillStyle = rg;
      gc.fill();
      gc.shadowBlur = 0;

    } else {
      // Normal note — filled diamond with neon border
      gc.shadowColor = n.color;
      gc.shadowBlur = 20;

      // Fill
      const rg = gc.createRadialGradient(cx - NOTE_RADIUS * 0.3, cy - NOTE_RADIUS * 0.3,
                                          1, cx, cy, NOTE_RADIUS);
      rg.addColorStop(0,   '#ffffff');
      rg.addColorStop(0.3, n.color);
      rg.addColorStop(1,   n.color + 'aa');
      drawDiamond(gc, cx, cy, NOTE_RADIUS);
      gc.fillStyle = rg;
      gc.fill();

      // Border
      drawDiamond(gc, cx, cy, NOTE_RADIUS);
      gc.strokeStyle = '#ffffff88';
      gc.lineWidth = 1.5;
      gc.stroke();

      // Corner cross-hair marks (cyberpunk detail)
      gc.strokeStyle = n.color + 'cc';
      gc.lineWidth = 1;
      [[cx, cy - NOTE_RADIUS - 3], [cx, cy + NOTE_RADIUS + 3],
       [cx - NOTE_RADIUS - 3, cy], [cx + NOTE_RADIUS + 3, cy]].forEach(([px, py]) => {
        gc.beginPath();
        gc.arc(px, py, 1.5, 0, Math.PI * 2);
        gc.fillStyle = n.color;
        gc.fill();
      });

      gc.shadowBlur = 0;
    }

    gc.globalAlpha = 1;
  });

  // Progress bar — dual color cyberpunk stripe
  const progress = Math.min(songTimer / SONG_DURATION, 1);
  gc.fillStyle = 'rgba(0,255,231,0.08)';
  gc.fillRect(0, 0, W, 5);
  const pg = gc.createLinearGradient(0, 0, W * progress, 0);
  pg.addColorStop(0,    '#00ffe7');
  pg.addColorStop(0.5,  '#bc00ff');
  pg.addColorStop(1,    '#ff006e');
  gc.shadowColor = '#00ffe7';
  gc.shadowBlur = 6;
  gc.fillStyle = pg;
  gc.fillRect(0, 0, W * progress, 5);
  gc.shadowBlur = 0;
}

// ─── Tap handling ──────────────────────────────────────────────────────────────
function onTap(lane) {
  if (state !== 'playing') return;
  initAudio();

  const jy = hitY();
  let best = null;
  let bestDist = Infinity;

  notes.forEach(n => {
    if (n.hit || n.missed || n.lane !== lane) return;
    const dist = Math.abs(n.y - jy);
    if (dist < bestDist) { bestDist = dist; best = n; }
  });

  const maxDist = TIMING.good * (DIFFICULTY[diff].speed / 1000);
  if (!best || bestDist > maxDist) return; // No note to hit

  best.hit = true;
  best.hitEffect = 1;

  const timingMs = bestDist / (DIFFICULTY[diff].speed / 1000);

  if (timingMs <= TIMING.perfect) {
    registerHit('perfect');
  } else {
    registerHit('good');
  }
}

function registerHit(type) {
  stats[type]++;
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  score += SCORE_TABLE[type] + combo * COMBO_BONUS;
  showJudgment(type);
  playSound(type);
  updateHUD();
}

function onMiss() {
  if (state !== 'playing') return;
  stats.miss++;
  combo = 0;
  lives--;
  showJudgment('miss');
  playSound('miss');
  updateHUD();
  updateLives();
  if (lives <= 0) endGame();
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('combo-display').textContent =
    combo >= 3 ? `${combo} COMBO` : '';
}

function updateLives() {
  const hearts = document.querySelectorAll('.heart');
  hearts.forEach((h, i) => {
    h.textContent = i < lives ? '▰' : '▱';
    h.style.opacity = i < lives ? '1' : '0.25';
    h.style.color = i < lives ? 'var(--cp-pink)' : 'rgba(255,0,110,0.3)';
  });
}

function renderLives() {
  const lifeDisplay = document.getElementById('life-display');
  lifeDisplay.replaceChildren(
    ...Array.from({ length: MAX_LIVES }, () => {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = '▰';
      return heart;
    })
  );
}

// ─── Judgment display ─────────────────────────────────────────────────────────
let judgmentTimer = null;
function showJudgment(type) {
  const el = document.getElementById('judgment');
  const map = {
    perfect: { text: 'PERFECT!', color: '#ffd700' },
    good:    { text: 'GOOD',     color: '#64ff96' },
    miss:    { text: 'MISS',     color: '#ff6464' },
  };
  const m = map[type];
  el.textContent = m.text;
  el.style.color = m.color;
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, -60%) scale(1.2)';
  el.style.transition = 'none';

  clearTimeout(judgmentTimer);
  judgmentTimer = setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, -80%) scale(0.9)';
  }, 350);
}

// ─── End game ─────────────────────────────────────────────────────────────────
function endGame() {
  if (state === 'result') return;
  state = 'result';
  const total = stats.perfect + stats.good + stats.miss;
  const acc = total > 0 ? (stats.perfect * 100 + stats.good * 60) / (total * 100) : 0;
  const rank = acc >= 0.95 ? 'S' : acc >= 0.85 ? 'A' : acc >= 0.70 ? 'B' : acc >= 0.50 ? 'C' : 'D';
  const rankColors = { S: '#ffd700', A: '#64c8ff', B: '#64ff96', C: '#ffc864', D: '#ff6464' };

  document.getElementById('rank-badge').textContent = rank;
  document.getElementById('rank-badge').style.color = rankColors[rank];
  document.getElementById('rank-badge').style.textShadow = `0 0 30px ${rankColors[rank]}`;
  document.getElementById('result-score').textContent = score.toLocaleString();
  document.getElementById('result-combo').textContent = maxCombo;
  document.getElementById('result-perfect').textContent = stats.perfect;
  document.getElementById('result-good').textContent = stats.good;
  document.getElementById('result-miss').textContent = stats.miss;

  document.getElementById('result-screen').classList.remove('hidden');
}

// ─── Button / Touch events ─────────────────────────────────────────────────────
document.querySelectorAll('.lane-btn').forEach(btn => {
  const lane = parseInt(btn.dataset.lane, 10);

  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    btn.classList.add('pressed');
    onTap(lane);
  }, { passive: false });

  btn.addEventListener('touchend', e => {
    e.preventDefault();
    btn.classList.remove('pressed');
  }, { passive: false });

  btn.addEventListener('mousedown', () => {
    btn.classList.add('pressed');
    onTap(lane);
  });

  btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
  btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
});

// Keyboard support (A S D F)
const KEY_MAP = { a: 0, s: 1, d: 2, f: 3, ArrowLeft: 0, ArrowDown: 1, ArrowUp: 2, ArrowRight: 3 };
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const lane = KEY_MAP[e.key];
  if (lane !== undefined) {
    e.preventDefault();
    onTap(lane);
  }
});

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    diff = btn.dataset.diff;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Start
document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('start-screen').classList.add('hidden');
  startGame();
});

// Retry
document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.add('hidden');
  startGame();
});

// Menu
document.getElementById('menu-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
  state = 'start';
});

// Home buttons
document.getElementById('home-btn-start').addEventListener('click', () => {
  window.location.href = '../../index.html';
});
document.getElementById('home-btn-result').addEventListener('click', () => {
  window.location.href = '../../index.html';
});

// Background loop (always running)
(function bgLoop() {
  updateBg();
  requestAnimationFrame(bgLoop);
})();
</script>
