<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <title>Mini Games</title>
  <style>
    :root {
      --pop-pink:   #ff6eb4;
      --pop-sky:    #38d9f5;
      --pop-yellow: #ffe44d;
      --pop-mint:   #4dffc3;
      --pop-purple: #c77dff;
      --pop-orange: #ff9f43;
      --font-main: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #1a0533 0%, #0a1a40 50%, #0d2b1a 100%);
      font-family: var(--font-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
    }

    /* Floating dot particles */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,110,180,0.15) 1px, transparent 1px),
        radial-gradient(circle, rgba(56,217,245,0.12) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,228,77,0.10) 1px, transparent 1px);
      background-size: 60px 60px, 90px 90px, 120px 120px;
      background-position: 0 0, 30px 30px, 15px 15px;
      pointer-events: none;
      z-index: 0;
      animation: bgFloat 8s ease-in-out infinite alternate;
    }

    @keyframes bgFloat {
      from { background-position: 0 0, 30px 30px, 15px 15px; }
      to   { background-position: 10px 20px, 40px 50px, 25px 35px; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      width: 100%;
      max-width: 600px;
    }

    /* Floating icons behind title */
    .sparkle-row {
      font-size: 1rem;
      letter-spacing: 10px;
      color: rgba(255,228,77,0.35);
      margin-bottom: 10px;
      animation: sparkleRow 3s ease-in-out infinite alternate;
    }

    @keyframes sparkleRow {
      from { opacity: 0.35; transform: scale(0.97); }
      to   { opacity: 0.8;  transform: scale(1.03); }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 5px;
      background: linear-gradient(135deg, var(--pop-sky) 0%, var(--pop-pink) 50%, var(--pop-yellow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 14px rgba(56,217,245,0.5));
      margin-bottom: 6px;
    }

    .subtitle {
      font-family: var(--font-main);
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px;
      margin-bottom: 36px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      padding: 0 10px;
    }

    @media (max-width: 480px) {
      .game-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      h1 { font-size: 2rem; }
    }

    .game-card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      text-decoration: none;
      display: block;
    }

    .game-card:hover  { transform: translateY(-6px); }
    .game-card:active { transform: scale(0.96); }

    /* Tetris card — sky/mint accent */
    .game-card.tetris {
      background: linear-gradient(145deg, rgba(56,217,245,0.18) 0%, rgba(77,255,195,0.10) 100%);
      border: 2px solid rgba(56,217,245,0.35);
      box-shadow: 0 4px 24px rgba(56,217,245,0.2);
    }

    .game-card.tetris:hover {
      box-shadow: 0 8px 36px rgba(56,217,245,0.45), 0 0 60px rgba(56,217,245,0.15);
      border-color: var(--pop-sky);
    }

    /* Rhythm card — pink/purple accent */
    .game-card.rhythm {
      background: linear-gradient(145deg, rgba(255,110,180,0.18) 0%, rgba(199,125,255,0.10) 100%);
      border: 2px solid rgba(255,110,180,0.35);
      box-shadow: 0 4px 24px rgba(255,110,180,0.2);
    }

    .game-card.rhythm:hover {
      box-shadow: 0 8px 36px rgba(255,110,180,0.45), 0 0 60px rgba(199,125,255,0.15);
      border-color: var(--pop-pink);
    }

    /* Glassmorphism inner */
    .card-content {
      padding: 30px 20px 26px;
      text-align: center;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(6px);
    }

    .card-icon {
      font-size: 3.2rem;
      margin-bottom: 14px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
      animation: iconBob 2.5s ease-in-out infinite alternate;
    }

    @keyframes iconBob {
      from { transform: translateY(0px); }
      to   { transform: translateY(-5px); }
    }

    .game-card.rhythm .card-icon {
      animation-delay: 0.4s;
    }

    /* Tetris block icon — T-tetromino shape */
    .tetris-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      margin: 0 auto 14px;
      width: fit-content;
      animation: iconBob 2.5s ease-in-out infinite alternate;
    }

    .tetris-icon .t-row {
      display: flex;
      gap: 3px;
    }

    .tetris-icon .blk {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      position: relative;
    }

    /* Glossy highlight on each block */
    .tetris-icon .blk::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 6px;
      height: 4px;
      background: rgba(255,255,255,0.45);
      border-radius: 2px;
    }

    .blk.c1 { background: var(--pop-sky);    box-shadow: 0 0 8px rgba(56,217,245,0.7); }
    .blk.c2 { background: var(--pop-pink);   box-shadow: 0 0 8px rgba(255,110,180,0.7); }
    .blk.c3 { background: var(--pop-yellow); box-shadow: 0 0 8px rgba(255,228,77,0.7); }
    .blk.c4 { background: var(--pop-mint);   box-shadow: 0 0 8px rgba(77,255,195,0.7); }
    .blk.c5 { background: var(--pop-purple); box-shadow: 0 0 8px rgba(199,125,255,0.7); }
    .blk.empty { background: transparent; box-shadow: none; }

    /* Rhythm lane icon */
    .rhythm-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin: 0 auto 14px;
      width: fit-content;
      animation: iconBob 2.5s ease-in-out 0.4s infinite alternate;
    }

    /* 4 vertical lanes */
    .rhythm-lanes {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      height: 64px;
      padding: 0 2px;
      position: relative;
    }

    .r-lane {
      width: 14px;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
    }

    /* Lane separator line */
    .r-lane::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(255,255,255,0.1);
      transform: translateX(-50%);
    }

    /* Falling note circles */
    .r-note {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid;
      position: absolute;
      left: 0;
    }

    .r-note::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 4px; height: 3px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
    }

    .r-note.ln0 { border-color: var(--pop-sky);    background: rgba(56,217,245,0.25);  box-shadow: 0 0 8px rgba(56,217,245,0.8); }
    .r-note.ln1 { border-color: var(--pop-pink);   background: rgba(255,110,180,0.25); box-shadow: 0 0 8px rgba(255,110,180,0.8); }
    .r-note.ln2 { border-color: var(--pop-purple); background: rgba(199,125,255,0.25); box-shadow: 0 0 8px rgba(199,125,255,0.8); }
    .r-note.ln3 { border-color: var(--pop-yellow); background: rgba(255,228,77,0.25);  box-shadow: 0 0 8px rgba(255,228,77,0.8); }

    /* Judgment line at bottom */
    .r-judgeline {
      width: 80px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--pop-sky), var(--pop-pink), var(--pop-purple), var(--pop-yellow));
      box-shadow: 0 0 10px rgba(255,110,180,0.6);
      margin-top: 4px;
    }

    .card-title {
      font-family: var(--font-main);
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .game-card.tetris .card-title {
      background: linear-gradient(135deg, var(--pop-sky), var(--pop-mint));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(56,217,245,0.4));
    }

    .game-card.rhythm .card-title {
      background: linear-gradient(135deg, var(--pop-pink), var(--pop-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(255,110,180,0.4));
    }

    .card-desc {
      font-family: var(--font-main);
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
    }

    /* Difficulty badge */
    .card-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .game-card.tetris .card-badge {
      background: rgba(56,217,245,0.15);
      border: 1px solid rgba(56,217,245,0.4);
      color: var(--pop-sky);
    }

    .game-card.rhythm .card-badge {
      background: rgba(255,110,180,0.15);
      border: 1px solid rgba(255,110,180,0.4);
      color: var(--pop-pink);
    }

    .footer {
      position: fixed;
      bottom: 16px;
      font-family: var(--font-main);
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255,255,255,0.18);
      letter-spacing: 3px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sparkle-row">✦ ✧ ★ ✧ ✦ ✧ ★ ✧ ✦</div>
    <h1>MINI GAMES</h1>
    <div class="subtitle">♪ ゲームをえらんでね ♪</div>

    <div class="game-grid">
      <a href="games/tetris/index.html" class="game-card tetris">
        <div class="card-content">
          <!-- Tetris blocks: stacked T + S + I pieces (4 cols wide) -->
          <div class="tetris-icon">
            <div class="t-row">
              <div class="blk empty"></div><div class="blk c1"></div><div class="blk c1"></div><div class="blk c1"></div>
            </div>
            <div class="t-row">
              <div class="blk empty"></div><div class="blk empty"></div><div class="blk c1"></div><div class="blk empty"></div>
            </div>
            <div class="t-row">
              <div class="blk empty"></div><div class="blk c3"></div><div class="blk c3"></div><div class="blk empty"></div>
            </div>
            <div class="t-row">
              <div class="blk c2"></div><div class="blk c3"></div><div class="blk c4"></div><div class="blk c4"></div>
            </div>
          </div>
          <div class="card-title">テトリス</div>
          <div class="card-desc">ブロックパズル</div>
          <div class="card-badge">小学生1〜4</div>
        </div>
      </a>

      <a href="games/rhythm-tap/index.html" class="game-card rhythm">
        <div class="card-content">
          <!-- Rhythm game icon: 4 lanes with falling note circles + judgment line -->
          <div class="rhythm-icon">
            <div class="rhythm-lanes">
              <div class="r-lane">
                <div class="r-note ln0" style="top:4px"></div>
                <div class="r-note ln0" style="top:34px"></div>
              </div>
              <div class="r-lane">
                <div class="r-note ln1" style="top:18px"></div>
              </div>
              <div class="r-lane">
                <div class="r-note ln2" style="top:6px"></div>
                <div class="r-note ln2" style="top:40px"></div>
              </div>
              <div class="r-lane">
                <div class="r-note ln3" style="top:24px"></div>
              </div>
            </div>
            <div class="r-judgeline"></div>
          </div>
          <div class="card-title">NEON//BEAT</div>
          <div class="card-desc">リズムタップゲーム</div>
          <div class="card-badge">小学生1〜4</div>
        </div>
      </a>
    </div>
  </div>

  <div class="footer">MINI GAMES PORTAL</div>
</body>
</html>
