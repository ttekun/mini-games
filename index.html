<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mini Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 231, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 231, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 6px;
      color: #00ffe7;
      text-shadow: 0 0 20px rgba(0, 255, 231, 0.5), 0 0 40px rgba(0, 255, 231, 0.2);
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.75rem;
      color: rgba(0, 255, 231, 0.4);
      letter-spacing: 3px;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 0 10px;
    }

    @media (max-width: 480px) {
      .game-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      h1 {
        font-size: 2rem;
      }
    }

    .game-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-4px);
    }

    .game-card:active {
      transform: scale(0.97);
    }

    /* Tetris card */
    .game-card.tetris {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 1px solid rgba(66, 153, 225, 0.4);
      box-shadow: 0 0 20px rgba(66, 153, 225, 0.15);
    }

    .game-card.tetris:hover {
      box-shadow: 0 4px 30px rgba(66, 153, 225, 0.35);
    }

    /* Rhythm card */
    .game-card.rhythm {
      background: linear-gradient(135deg, #04030a 0%, #080614 50%, #0d0b1f 100%);
      border: 1px solid rgba(0, 255, 231, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 231, 0.1);
    }

    .game-card.rhythm:hover {
      box-shadow: 0 4px 30px rgba(0, 255, 231, 0.3);
    }

    .card-content {
      padding: 32px 20px;
      text-align: center;
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .game-card.tetris .card-title {
      color: #63b3ed;
      text-shadow: 0 0 10px rgba(99, 179, 237, 0.4);
    }

    .game-card.rhythm .card-title {
      color: #00ffe7;
      text-shadow: 0 0 10px rgba(0, 255, 231, 0.4);
    }

    .card-desc {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.72rem;
      color: rgba(200, 200, 255, 0.45);
      letter-spacing: 1px;
    }

    /* Corner decorations on cards */
    .game-card::before,
    .game-card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      pointer-events: none;
    }

    .game-card::before {
      top: 6px;
      left: 6px;
      border-top: 2px solid currentColor;
      border-left: 2px solid currentColor;
    }

    .game-card::after {
      bottom: 6px;
      right: 6px;
      border-bottom: 2px solid currentColor;
      border-right: 2px solid currentColor;
    }

    .game-card.tetris::before,
    .game-card.tetris::after {
      color: rgba(66, 153, 225, 0.4);
    }

    .game-card.rhythm::before,
    .game-card.rhythm::after {
      color: rgba(0, 255, 231, 0.3);
    }

    /* Scanline overlay */
    .container::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.1) 2px,
        rgba(0, 0, 0, 0.1) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .footer {
      position: fixed;
      bottom: 16px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.65rem;
      color: rgba(200, 200, 255, 0.2);
      letter-spacing: 2px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MINI GAMES</h1>
    <div class="subtitle">// SELECT YOUR GAME //</div>

    <div class="game-grid">
      <a href="games/tetris/index.html" class="game-card tetris">
        <div class="card-content">
          <span class="card-icon">🧱</span>
          <div class="card-title">TETRIS</div>
          <div class="card-desc">Classic block puzzle</div>
        </div>
      </a>

      <a href="games/rhythm-tap/index.html" class="game-card rhythm">
        <div class="card-content">
          <span class="card-icon">🎵</span>
          <div class="card-title">NEON//BEAT</div>
          <div class="card-desc">Rhythm tap game</div>
        </div>
      </a>
    </div>
  </div>

  <div class="footer">MINI GAMES PORTAL</div>
</body>
</html>
